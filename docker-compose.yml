services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: twilightimperium
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5287:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=twilightimperium;Username=postgres;Password=postgres
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: